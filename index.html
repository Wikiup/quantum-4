<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum 4 — Decision Randomizer</title>
    <meta name="description" content="Physics-based D4 Dice and Spinner. Spin the wheel or roll the dice to get a number from 1-4.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .glow {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .mode-btn.active {
            background: rgba(0, 255, 255, 0.15);
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        #result-display {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #result-display.show {
            opacity: 1;
            transform: scale(1);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header / Mode Switcher -->
    <header class="p-6 flex justify-between items-center z-10 absolute top-0 w-full">
        <h1 class="text-xl font-bold tracking-widest text-gray-400">QUANTUM<span class="text-cyan-400">4</span></h1>
        
        <div class="flex gap-2">
            <button id="mode-spinner" class="mode-btn active px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wide">Spinner</button>
            <button id="mode-dice" class="mode-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wide">D4 Dice</button>
        </div>
    </header>

    <!-- Main Canvas Area -->
    <main class="flex-1 relative flex items-center justify-center">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Center Action Button (Invisible overlay for tap) -->
        <div id="tap-zone" class="absolute inset-0 z-0"></div>

        <!-- Result Overlay -->
        <div id="result-display" class="absolute pointer-events-none flex flex-col items-center justify-center z-20">
            <div class="text-6xl font-black text-white glow" id="result-value">1</div>
        </div>
        
        <!-- Instruction -->
        <div id="instruction" class="absolute bottom-20 text-gray-500 text-sm animate-pulse pointer-events-none z-10">
            TAP TO SPIN
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const resultDisplay = document.getElementById('result-display');
        const resultValue = document.getElementById('result-value');
        const instruction = document.getElementById('instruction');
        const tapZone = document.getElementById('tap-zone');
        
        // State
        let mode = 'spinner'; // 'spinner' | 'dice'
        let width, height, centerX, centerY;
        let isAnimating = false;
        
        // Spinner State
        let angle = 0;
        let velocity = 0;
        let friction = 0.985;
        const colors = ['#ef4444', '#3b82f6', '#22c55e', '#f59e0b']; // Red, Blue, Green, Yellow

        // Dice State (3D Tetrahedron)
        let rotation = { x: 0, y: 0, z: 0 };
        let rotationSpeed = { x: 0, y: 0, z: 0 };
        const size = 150;
        const vertices = [
            { x: size, y: size, z: size },
            { x: -size, y: -size, z: size },
            { x: -size, y: size, z: -size },
            { x: size, y: -size, z: -size }
        ];
        const faces = [
            { v: [0, 1, 2], n: 1, color: '#ef4444' },
            { v: [0, 1, 3], n: 2, color: '#3b82f6' },
            { v: [1, 2, 3], n: 3, color: '#22c55e' },
            { v: [2, 0, 3], n: 4, color: '#f59e0b' }
        ];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // ----------------------------------------------------------------
        // Physics Loop
        // ----------------------------------------------------------------
        function loop() {
            ctx.clearRect(0, 0, width, height);

            if (mode === 'spinner') {
                drawSpinner();
            } else {
                drawDice();
            }
            
            requestAnimationFrame(loop);
        }
        loop();

        // ----------------------------------------------------------------
        // Spinner Logic
        // ----------------------------------------------------------------
        function drawSpinner() {
            if (isAnimating) {
                angle += velocity;
                velocity *= friction;
                if (Math.abs(velocity) < 0.002) {
                    velocity = 0;
                    isAnimating = false;
                    showResult(getSpinnerResult());
                    instruction.style.opacity = 1;
                    instruction.textContent = "TAP TO SPIN AGAIN";
                }
            }

            const radius = Math.min(width, height) * 0.35;
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle);

            const arc = (Math.PI * 2) / 4;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, i * arc, (i + 1) * arc);
                ctx.fill();
                
                ctx.save();
                ctx.rotate(i * arc + arc / 2);
                ctx.translate(radius * 0.6, 0);
                ctx.rotate(Math.PI / 2);
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.font = 'bold 40px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i + 1, 0, 0);
                ctx.restore();
            }
            ctx.restore();

            // Pointer (Fixed at top, Pointing Down)
            ctx.beginPath();
            ctx.fillStyle = '#fff';
            // Tip at bottom (radius - overlap)
            ctx.moveTo(centerX, centerY - radius + 15);
            // Top corners
            ctx.lineTo(centerX - 15, centerY - radius - 20);
            ctx.lineTo(centerX + 15, centerY - radius - 20);
            ctx.fill();
            
            // Center Cap
            ctx.beginPath();
            ctx.fillStyle = '#111';
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function getSpinnerResult() {
            let rel = (-Math.PI / 2 - angle) % (Math.PI * 2);
            if (rel < 0) rel += Math.PI * 2;
            const quadrant = Math.floor(rel / (Math.PI / 2));
            return quadrant + 1;
        }

        // ----------------------------------------------------------------
        // 3D Dice Logic
        // ----------------------------------------------------------------
        function project(p, rot) {
            let x = p.x, y = p.y, z = p.z;
            // Rotate X
            let y1 = y * Math.cos(rot.x) - z * Math.sin(rot.x);
            let z1 = y * Math.sin(rot.x) + z * Math.cos(rot.x);
            y = y1; z = z1;
            // Rotate Y
            let x1 = x * Math.cos(rot.y) - z * Math.sin(rot.y);
            z1 = x * Math.sin(rot.y) + z * Math.cos(rot.y);
            x = x1; z = z1;
            // Rotate Z
            let x2 = x * Math.cos(rot.z) - y * Math.sin(rot.z);
            let y2 = x * Math.sin(rot.z) + y * Math.cos(rot.z);
            x = x2; y = y2;
            // Perspective
            const scale = 800 / (800 + z);
            return { x: x * scale + centerX, y: y * scale + centerY, z: z, scale: scale };
        }

        function drawDice() {
            if (isAnimating) {
                rotationSpeed.x += (Math.random() - 0.5) * 0.1;
                rotationSpeed.y += (Math.random() - 0.5) * 0.1;
                rotation.x += rotationSpeed.x;
                rotation.y += rotationSpeed.y;
                velocity *= friction;
                rotationSpeed.x *= 0.98;
                rotationSpeed.y *= 0.98;

                if (Math.abs(velocity) < 0.005) {
                    velocity = 0;
                    isAnimating = false;
                    const result = Math.floor(Math.random() * 4) + 1;
                    showResult(result);
                    instruction.style.opacity = 1;
                    instruction.textContent = "TAP TO ROLL AGAIN";
                }
            } else {
                rotation.x += 0.005;
                rotation.y += 0.01;
            }

            const projectedFaces = faces.map(face => {
                const p1 = project(vertices[face.v[0]], rotation);
                const p2 = project(vertices[face.v[1]], rotation);
                const p3 = project(vertices[face.v[2]], rotation);
                const z = (p1.z + p2.z + p3.z) / 3;
                return { points: [p1, p2, p3], z, color: face.color, n: face.n };
            }).sort((a, b) => b.z - a.z);

            projectedFaces.forEach(f => {
                ctx.beginPath();
                ctx.moveTo(f.points[0].x, f.points[0].y);
                ctx.lineTo(f.points[1].x, f.points[1].y);
                ctx.lineTo(f.points[2].x, f.points[2].y);
                ctx.closePath();
                
                ctx.fillStyle = f.color;
                ctx.fill();
                ctx.strokeStyle = `rgba(255,255,255,0.2)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                const cx = (f.points[0].x + f.points[1].x + f.points[2].x) / 3;
                const cy = (f.points[0].y + f.points[1].y + f.points[2].y) / 3;
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = `bold ${40 * f.points[0].scale}px Orbitron`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(f.n, cx, cy);
            });
        }

        // ----------------------------------------------------------------
        // Interaction
        // ----------------------------------------------------------------
        tapZone.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);

            if (isAnimating) {
                // Turbo Boost: Add speed on tap
                velocity += 0.2;
                return;
            }

            resultDisplay.classList.remove('show');
            instruction.style.opacity = 0;
            isAnimating = true;
            if (mode === 'spinner') {
                velocity = 0.2 + Math.random() * 0.3;
            } else {
                velocity = 0.3 + Math.random() * 0.2;
            }
            if (navigator.vibrate) navigator.vibrate(50);
        });
        
        function showResult(val) {
            resultValue.textContent = val;
            resultValue.style.color = colors[val-1];
            resultDisplay.classList.add('show');
            if (navigator.vibrate) navigator.vibrate([50, 50, 100]);
        }
        
        document.getElementById('mode-spinner').addEventListener('click', (e) => {
            setMode('spinner', e.target);
        });
        document.getElementById('mode-dice').addEventListener('click', (e) => {
            setMode('dice', e.target);
        });
        
        function setMode(newMode, btn) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            isAnimating = false;
            resultDisplay.classList.remove('show');
            instruction.textContent = mode === 'spinner' ? "TAP TO SPIN" : "TAP TO ROLL";
            instruction.style.opacity = 1;
        }
    </script>
</body>
</html>
